[virtual_servers]
app1 ansible_host=127.0.0.1 ansible_port=2221
app2 ansible_host=127.0.0.1 ansible_port=2222
app3 ansible_host=127.0.0.1 ansible_port=2223

[virtual_servers:vars]
ansible_user=ansible
ansible_ssh_private_key_file=ansible/ansible_container_key
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null