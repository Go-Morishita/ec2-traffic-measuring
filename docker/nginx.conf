events {}

http {
    upstream app_servers {
        server app1:8000;
        server app2:8000;
        server app3:8000;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://app_servers;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}